<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3PM · Quản lý Giao dịch</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>
<body>

  <!-- ===== LOGIN ===== -->
  <div id="loginView" class="container d-none">
    <div class="card stat-card login-card p-4">
      <h4 class="brand text-center mb-1" style="color:var(--primary)">🕒 3PM</h4>
      <p class="text-center text-muted">Đăng nhập hệ thống thu chi</p>
      <input id="liUser" class="form-control mb-2" placeholder="Tài khoản (staff / ketoan)">
      <input id="liPass" type="password" class="form-control mb-3" placeholder="Mật khẩu (123)">
      <button class="btn btn-primary w-100" onclick="doLogin()">Đăng nhập</button>
      <div id="liErr" class="text-danger small mt-2"></div>
    </div>
  </div>

  <!-- ===== APP ===== -->
  <div id="appView" class="d-none">
    <nav class="navbar navbar-expand-lg navbar-3pm px-3">
      <div class="container-fluid">
        <span class="brand">🕒 3PM</span>
        <button class="navbar-toggler bg-light" data-bs-toggle="collapse" data-bs-target="#nav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
          <ul class="navbar-nav me-auto ms-3">
            <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
            <li class="nav-item"><a class="nav-link active" href="transaction.html">Giao dịch</a></li>
          </ul>
          <span class="navbar-text text-light me-3" id="userLabel"></span>
          <button class="btn btn-sm btn-outline-light" onclick="logout()">Đăng xuất</button>
        </div>
      </div>
    </nav>

    <div class="container-fluid py-4 px-md-5">
      <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mb-3">
        <h4 class="section-title m-0">Quản lý giao dịch</h4>
        <div>
          <button class="btn btn-success" onclick="openForm('Income')"><i class="bi bi-plus-lg"></i> Thêm Thu</button>
          <button class="btn btn-danger"  onclick="openForm('Expense')"><i class="bi bi-plus-lg"></i> Thêm Chi</button>
        </div>
      </div>

      <!-- FILTER -->
      <div class="filter-bar mb-3">
        <div class="row g-2">
          <div class="col-12 col-md-4">
            <input id="fSearch" class="form-control" placeholder="🔍 Tìm theo tên / ghi chú / người tạo...">
          </div>
          <div class="col-6 col-md-3">
            <input id="fMonth" type="month" class="form-control">
          </div>
          <div class="col-6 col-md-3">
            <select id="fStatus" class="form-select">
              <option value="">-- Tất cả trạng thái --</option>
              <option>Chờ duyệt</option>
              <option>Đã chi</option>
              <option>Từ chối</option>
            </select>
          </div>
          <div class="col-12 col-md-2 d-grid">
            <button class="btn btn-primary" onclick="loadTable()"><i class="bi bi-funnel"></i> Lọc</button>
          </div>
        </div>
      </div>

      <!-- TABLE -->
      <div class="table-wrap">
        <table class="table table-excel table-bordered m-0">
          <thead>
            <tr>
              <th>ID</th><th>Loại</th><th>Khoản thu/chi</th><th>Trạng thái</th>
              <th class="text-end">SL</th><th class="text-end">Đơn giá</th><th class="text-end">Tổng tiền</th>
              <th>Ghi chú</th><th>Ảnh</th><th>Ngày tạo</th><th>Người tạo</th>
              <th style="min-width:170px">Thao tác</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr><td colspan="12" class="text-center text-muted py-4">Đang tải…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ===== MODAL THÊM/SỬA ===== -->
  <div class="modal fade" id="txModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header" style="background:var(--ink);color:#fff">
          <h5 class="modal-title" id="modalTitle">Thêm giao dịch</h5>
          <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="fId">
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Loại</label>
              <select id="fType" class="form-select">
                <option value="Income">Thu (Income)</option>
                <option value="Expense">Chi (Expense)</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Khoản thu/chi</label>
              <input id="fTitle" class="form-control" placeholder="VD: Bán váy hoa">
            </div>
            <div class="col-md-4">
              <label class="form-label">Số lượng</label>
              <input id="fQty" type="number" class="form-control" value="1" oninput="calcTotal()">
            </div>
            <div class="col-md-4">
              <label class="form-label">Đơn giá</label>
              <input id="fPrice" type="number" class="form-control" value="0" oninput="calcTotal()">
            </div>
            <div class="col-md-4">
              <label class="form-label">Tổng tiền</label>
              <input id="fTotal" class="form-control bg-light" readonly>
            </div>
            <div class="col-12">
              <label class="form-label">Ghi chú</label>
              <textarea id="fNote" class="form-control" rows="2"></textarea>
            </div>
            <div class="col-12">
              <label class="form-label">Ảnh hóa đơn / chứng từ</label>
              <input id="fImage" type="file" accept="image/*" class="form-control">
              <div class="mt-2">
                <img id="imgPreview" class="d-none" style="max-height:120px;border-radius:8px">
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
          <button class="btn btn-primary" id="saveBtn" onclick="saveTx()">Lưu</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== MODAL DUYỆT (Đã chi) / TỪ CHỐI ===== -->
  <div class="modal fade" id="actionModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header" style="background:var(--ink);color:#fff">
          <h5 class="modal-title" id="actionTitle">Duyệt giao dịch</h5>
          <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="actId">

          <!-- Duyệt: upload ảnh chuyển tiền -->
          <div id="approveSection">
            <label class="form-label">Ảnh xác nhận đã chuyển tiền <span class="text-danger">*</span></label>
            <input id="proofImage" type="file" accept="image/*" class="form-control">
            <div class="mt-2">
              <img id="proofPreview" class="d-none" style="max-height:160px;border-radius:8px">
            </div>
          </div>

          <!-- Từ chối: nhập lý do -->
          <div id="rejectSection" class="d-none">
            <label class="form-label">Lý do từ chối chi tiền <span class="text-danger">*</span></label>
            <textarea id="rejectReason" class="form-control" rows="3" placeholder="Nhập lý do từ chối..."></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
          <button class="btn btn-primary" id="actSaveBtn" onclick="confirmAction()">Lưu</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="api.js"></script>
  <script src="transaction.js"></script>
</body>
</html>
